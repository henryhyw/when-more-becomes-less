<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="158" viewBox="29 59 440 158">
  <title>Two-probe design: same prefix, different slot position</title>
  <desc>Schematic of the two probes. Both share an N-copy target prefix; only the position of the prediction slot differs. Adjacent probe places the slot directly after the prefix; displaced probe places it in a fresh sentence after a clause break and a frame.</desc>

  <style>
    text { font-family: 'Liberation Sans', 'Helvetica', 'Arial', sans-serif; }
    .head { font-size: 16px; font-weight: 700; fill: #3d3d3a; }
    .sub  { font-size: 14px; font-weight: 400; fill: #73726c; }
    .box-title    { font-size: 16px; font-weight: 700; }
    .box-subtitle { font-size: 14px; font-weight: 400; }
  </style>

  <text class="head" x="30" y="78">(a) Adjacent</text>
  <text class="sub"  x="30" y="98">slot adjoins the prefix</text>

  <rect x="170" y="60" width="120" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
  <text class="box-title"    x="230" y="84"  text-anchor="middle" fill="#0C447C">target × N</text>
  <text class="box-subtitle" x="230" y="104" text-anchor="middle" fill="#185FA5">N copies</text>

  <rect x="300" y="60" width="44" height="56" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
  <text class="box-title" x="322" y="94" text-anchor="middle" fill="#712B13">?</text>

  <line x1="230" y1="118" x2="230" y2="158" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="225" y1="118" x2="235" y2="118" stroke="#888780" stroke-width="0.6" opacity="0.7"/>
  <line x1="225" y1="158" x2="235" y2="158" stroke="#888780" stroke-width="0.6" opacity="0.7"/>
  <text class="sub" x="242" y="143" fill="#73726c">shared prefix</text>

  <text class="head" x="30" y="180">(b) Displaced</text>
  <text class="sub"  x="30" y="200">slot in a fresh clause</text>

  <rect x="170" y="160" width="120" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
  <text class="box-title"    x="230" y="184" text-anchor="middle" fill="#0C447C">target × N</text>
  <text class="box-subtitle" x="230" y="204" text-anchor="middle" fill="#185FA5">N copies</text>

  <text class="box-title" x="297" y="194" text-anchor="middle" fill="#3d3d3a">.</text>

  <rect x="304" y="160" width="110" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6" stroke-dasharray="4 3"/>
  <text class="box-title"    x="359" y="184" text-anchor="middle" fill="#444441">fresh frame</text>
  <text class="box-subtitle" x="359" y="204" text-anchor="middle" fill="#5F5E5A">F0–F4</text>

  <rect x="424" y="160" width="44" height="56" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
  <text class="box-title" x="446" y="194" text-anchor="middle" fill="#712B13">?</text>
</svg>
